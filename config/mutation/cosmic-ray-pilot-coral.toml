[cosmic-ray]
module-path = "src/helix_ids/models/adaptation/coral_loss.py"
timeout = 60
excluded-modules = []
test-command = "python -m pytest -x --tb=short -p no:cov tests/test_coral_loss.py"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.operators]
operators = [
    "core/NumberReplacer",
    "core/ReplaceComparisonOperator_Eq_NotEq",
    "core/ReplaceComparisonOperator_Gt_Lt",
    "core/ReplaceAndWithOr",
]
