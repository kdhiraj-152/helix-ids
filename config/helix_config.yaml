# HELIX-IDS Model Configuration
# Defines architecture variants for different deployment targets

# =============================================================================
# MODEL VARIANTS
# =============================================================================

variants:
  # HELIX-Nano: Ultra-lightweight for ESP32 (520KB SRAM)
  nano:
    name: "HELIX-Nano"
    target_device: "ESP32"
    target_size_kb: 30
    target_latency_ms: 1.0
    
    architecture:
      feature_extractor:
        layers: [64, 32]
        activation: relu
        dropout: 0.2
        batch_norm: true
        
      attention:
        enabled: true
        n_heads: 2
        hidden_dim: 32
        
      classifier:
        hidden_dim: 32
        hierarchical: false  # Binary + 4-class only (no fine-grained)
        confidence_head: false
        
    training:
      epochs: 100
      batch_size: 256
      learning_rate: 1.0e-3
      weight_decay: 1.0e-4
      
    quantization:
      enabled: true
      bits: 8  # INT8 quantization
      
    pruning:
      enabled: true
      ratio: 0.5  # 50% weight pruning

  # HELIX-Lite: Balanced for Raspberry Pi Zero (512MB RAM)
  lite:
    name: "HELIX-Lite"
    target_device: "Raspberry Pi Zero"
    target_size_kb: 200
    target_latency_ms: 5.0
    
    architecture:
      feature_extractor:
        layers: [96, 64, 48]
        activation: relu
        dropout: 0.25
        batch_norm: true
        
      attention:
        enabled: true
        n_heads: 4
        hidden_dim: 48
        
      classifier:
        hidden_dim: 48
        hierarchical: true  # Full 3-level hierarchy
        confidence_head: true
        
    training:
      epochs: 150
      batch_size: 128
      learning_rate: 1.0e-3
      weight_decay: 1.0e-4
      
    quantization:
      enabled: true
      bits: 8
      
    pruning:
      enabled: true
      ratio: 0.3

  # HELIX-Full: Maximum accuracy for Raspberry Pi 4 (4GB RAM)
  full:
    name: "HELIX-Full"
    target_device: "Raspberry Pi 4"
    target_size_kb: 2000
    target_latency_ms: 10.0
    
    architecture:
      feature_extractor:
        layers: [128, 64]
        activation: relu
        dropout: 0.2
        batch_norm: true
        
      attention:
        enabled: true
        n_heads: 4
        hidden_dim: 64
        
      classifier:
        hidden_dim: 64
        hierarchical: true
        fine_grained: true  # Include 23-class fine-grained
        confidence_head: true
        
    training:
      epochs: 200
      batch_size: 64
      learning_rate: 5.0e-4
      weight_decay: 1.0e-5
      
    quantization:
      enabled: false  # FP32 for maximum accuracy
      
    pruning:
      enabled: false

# =============================================================================
# COMMON SETTINGS
# =============================================================================

common:
  # Input/Output dimensions
  input_features: 41  # NSL-KDD default
  n_classes_binary: 2  # Normal vs Attack
  n_classes_family: 4  # DoS, Probe, R2L, U2R
  n_classes_fine: 23   # All specific attacks
  
  # Default training settings
  optimizer: adam
  scheduler: cosine_annealing
  warmup_epochs: 5
  early_stopping:
    patience: 20
    monitor: threat_weighted_f1
    mode: max
    
  # Loss function
  loss:
    type: multi_task
    focal_gamma: 2.0
    curriculum_learning: true
    
  # Regularization
  label_smoothing: 0.1
  mixup_alpha: 0.2
  
  # Data
  train_val_test_split: [0.7, 0.15, 0.15]
  stratified: true

# =============================================================================
# CURRICULUM LEARNING SCHEDULE
# =============================================================================

curriculum:
  # Loss weight evolution during training
  schedule:
    - epochs: [1, 10]
      weights: {binary: 1.0, family: 0.0, fine: 0.0, calibration: 0.0}
      description: "Binary classification only"
      
    - epochs: [11, 30]
      weights: {binary: 0.5, family: 0.5, fine: 0.0, calibration: 0.0}
      description: "Add family classification"
      
    - epochs: [31, 50]
      weights: {binary: 0.3, family: 0.4, fine: 0.3, calibration: 0.0}
      description: "Add fine-grained classification"
      
    - epochs: [51, null]
      weights: {binary: 0.2, family: 0.3, fine: 0.3, calibration: 0.2}
      description: "Full multi-task with calibration"

# =============================================================================
# EXPORT FORMATS
# =============================================================================

export:
  formats:
    - name: pytorch
      extension: .pt
      description: "PyTorch model state dict"
      
    - name: onnx
      extension: .onnx
      description: "ONNX for cross-platform deployment"
      opset_version: 13
      
    - name: tflite
      extension: .tflite
      description: "TensorFlow Lite for mobile/edge"
      quantization: int8
      
    - name: c_header
      extension: .h
      description: "C header for ESP32 native deployment"
      
    - name: pickle
      extension: .pkl
      description: "Python pickle for sklearn-compatible interface"

# =============================================================================
# METRICS & EVALUATION
# =============================================================================

evaluation:
  primary_metrics:
    - accuracy
    - macro_f1
    - threat_weighted_f1
    - per_class_f1
    
  minority_class_metrics:
    - r2l_f1
    - u2r_f1
    - r2l_recall
    - u2r_recall
    
  edge_metrics:
    - model_size_kb
    - inference_latency_ms
    - memory_footprint_kb
    
  targets:
    nano:
      min_accuracy: 0.70
      min_r2l_f1: 0.15
      min_u2r_f1: 0.10
      
    lite:
      min_accuracy: 0.75
      min_r2l_f1: 0.25
      min_u2r_f1: 0.18
      
    full:
      min_accuracy: 0.80
      min_r2l_f1: 0.35
      min_u2r_f1: 0.25
