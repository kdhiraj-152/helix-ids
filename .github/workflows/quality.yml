name: Quality Gates

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: src

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-lock.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-lock.txt ]; then pip install -r requirements-lock.txt; fi
          pip install pytest pytest-cov ruff mypy hypothesis numpy pandas onnx onnxruntime fastapi uvicorn

      - name: 1. Coverage gate (≥15%)
        run: |
          python -m pytest -q \
            --cov=src/helix_ids \
            --cov-report=term-missing \
            --cov-report=xml:results/coverage.xml \
            --cov-fail-under=15 \
            --junitxml=results/junit/quality-report.xml \
            || pytest_exit=$?
          echo "pytest exit code: ${pytest_exit:-0}"
          COV=$(python -m coverage report --format=total 2>/dev/null | tail -1 || echo "0")
          echo "COVERAGE=${COV}" >> $GITHUB_ENV
          echo "Coverage: ${COV}% (gate: 15%)"
          if (( $(echo "$COV < 15" | bc -l 2>/dev/null || echo 1) )); then
            echo "FAIL: Coverage ${COV}% below 15% gate"
            exit 1
          fi

      - name: 2. Benchmark regression
        run: |
          python scripts/benchmarks/benchmark_pipeline.py
          # check_performance_regression.py requires --baseline and --current
          # which are only available in release/nightly contexts.

      - name: 3. Dependency audit (reverse deps + self-imports)
        run: |
          echo "=== Dependency audit ==="
          python3 -c '
          import ast
          from pathlib import Path
          project_root = Path(".")
          src = project_root / "src" / "helix_ids"
          offenders = []
          for pyfile in sorted(src.rglob("*.py")):
              if pyfile.name == "__init__.py":
                  continue
              try:
                  tree = ast.parse(pyfile.read_text("utf-8"))
              except SyntaxError:
                  continue
              targets = set()
              for node in ast.walk(tree):
                  if isinstance(node, ast.Import):
                      for alias in node.names:
                          targets.add(alias.name.split(".")[0])
                  elif isinstance(node, ast.ImportFrom) and node.module:
                      targets.add(node.module.split(".")[0])
              if "scripts" in targets:
                  rel = pyfile.relative_to(project_root).as_posix()
                  offenders.append(rel)
          if offenders:
              print(f"FAIL: New reverse dependencies ({len(offenders)})")
              for o in offenders:
                  print(f"  {o}")
              exit(1)
          print("PASS: No reverse dependencies")
          self_imports = []
          for pyfile in sorted(src.rglob("*.py")):
              if pyfile.name == "__init__.py":
                  continue
              rel = pyfile.relative_to(project_root).as_posix()
              module_path = rel.replace("/", ".").replace(".py", "")
              try:
                  tree = ast.parse(pyfile.read_text("utf-8"))
              except SyntaxError:
                  continue
              for node in ast.walk(tree):
                  if isinstance(node, ast.ImportFrom) and node.module == module_path:
                      self_imports.append(rel)
          if self_imports:
              print(f"FAIL: Self-imports found ({len(self_imports)})")
              for s in self_imports:
                  print(f"  {s}")
              exit(1)
          print("PASS: No self-imports")
          '

      - name: 4. License compliance check
        run: |
          pip install pip-licenses
          mkdir -p results/licenses
          pip-licenses --format=csv --output-file=results/licenses/licenses.csv
          pip-licenses --format=json --output-file=results/licenses/licenses.json
          if [ -f scripts/ci/check_licenses_v2.py ]; then
            python3 scripts/ci/check_licenses_v2.py results/licenses/licenses.csv
          else
            echo "License check script not found — skipping"
          fi

      - name: 5. Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-coverage-report
          path: results/coverage.xml

      - name: 6. Upload junit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-junit-report
          path: results/junit/quality-report.xml
