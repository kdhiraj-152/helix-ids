name: runtime-monitoring-hardening CI

on:
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Ensure test tooling is available in CI (pytest may be in dev deps locally)
          pip install pytest pytest-cov || true

      - name: py_compile
        run: python -m compileall src

      - name: Run full pytest
        run: |
          pytest -q

      - name: AST contract enforcement
        run: |
          python3 scripts/ci/verify_contract_sidecars.py

  governance_ast:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Governance AST enforcement
        run: |
          python -m helix_ids.governance.ast_validator --paths src scripts --ci --json

  contract_lifecycle:
    needs: [governance_ast]
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      HELIX_ALLOW_LEGACY_ARTIFACTS: "0"
      HELIX_ALLOW_LEGACY_MANIFEST: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install onnx onnxruntime pytest pytest-cov

      - name: Contract lifecycle tests
        run: |
          pytest -q tests/test_export_contract.py tests/test_runtime_invariants.py tests/test_lifecycle_verifier.py

  schema_governance:
    needs: [governance_ast]
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pyyaml pytest pytest-cov || true

    - name: Schema registry validation
      run: |
        python scripts/ci/validate_schema_registry.py

    - name: Governance documentation existence checks
      run: |
        python scripts/ci/validate_governance_docs.py

    - name: Governance consistency and ADR claim validation
      run: |
        python scripts/ci/validate_governance_consistency.py

    - name: Upload governance gate artifacts
      uses: actions/upload-artifact@v4
      with:
        name: governance-gate-results
        path: |
          results/gates/schema_registry_validation.json
          results/gates/governance_docs_validation.json
          results/gates/governance_consistency_validation.json

  benchmark_enforcement:
    needs: [contract_lifecycle, schema_governance]
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install jsonschema pytest pytest-cov || true

      - name: Validate experiment manifests (YAML load + expansion)
        run: |
          cat << 'PYEOF' | python -
          from pathlib import Path
          import sys
          sys.path.insert(0, 'src')
          from scripts.evaluation import benchmarks
          paths = [
            Path('config/experiments/smoke.yaml'),
            Path('config/experiments/governance_ablation.yaml'),
            Path('config/experiments/edge_latency.yaml'),
            Path('config/experiments/drift_robustness.yaml'),
          ]
          for p in paths:
            if not p.exists():
              raise FileNotFoundError(p)
          specs = benchmarks._load_all_manifests(paths)
          if not specs:
            raise RuntimeError('No expanded benchmark specs')
          print(f'Expanded {len(specs)} runs from manifests')
          PYEOF

      - name: Run benchmark formalization + governance tests
        run: |
          pytest -q tests/test_benchmark_formalization.py tests/test_export_contract.py tests/test_governance/test_fingerprinting.py

      - name: Execute benchmark dry-run for governed manifests
        run: |
          python scripts/evaluation/benchmarks.py --manifest config/experiments/smoke.yaml --manifest config/experiments/governance_ablation.yaml --manifest config/experiments/edge_latency.yaml --manifest config/experiments/drift_robustness.yaml --dry-run

      - name: Validate generated manifests and results (CI validator)
        env:
          BENCHMARK_EXPECTED_MANIFEST_IDS: "phase1_smoke,phase1_governance_ablation,phase1_edge_latency,phase1_drift_robustness"
        run: |
          set -euo pipefail
          PYTHONPATH=src python scripts/ci/validate_benchmark_outputs.py

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            results/manifests/**
            results/metrics/**
            results/gates/**
