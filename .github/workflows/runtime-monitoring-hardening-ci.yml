name: runtime-monitoring-hardening CI

on:
  pull_request:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Ensure test tooling is available in CI (pytest may be in dev deps locally)
          pip install pytest pytest-cov || true

      - name: py_compile
        run: python -m compileall src

      - name: Run full pytest
        run: |
          pytest -q

      - name: Grep guard against forbidden tokens
        run: |
          set -e
          NG_PATTERNS="warnings\.warn\(|contract_version|allow_partial|missing_features|extra_features|fallback|compat|inferred_input_dim|inferred_classes|reindex|intersection|pad|truncate|align|repair|recover"
          # Limit search to source and scripts directories to avoid matching docs and workflow files
          MATCHES="$(git grep -InE \"$NG_PATTERNS\" -- src scripts | grep -v 'tests/fixtures/' || true)"
          if [ -n "$MATCHES" ]; then
            echo "❌ Forbidden patterns found in repository:" && printf '%s\n' "$MATCHES"
            exit 1
          else
            echo "✅ No forbidden patterns found"
          fi

      - name: Verify exporter sidecars and contract payloads
        run: |
          python3 scripts/ci/verify_contract_sidecars.py
