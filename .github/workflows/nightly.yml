name: Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC

env:
  PYTHONPATH: src

jobs:
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  cross_python:
    name: Cross-python tests (${{ matrix.python-version }})
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
      fail-fast: false
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements-lock.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-lock.txt ]; then pip install -r requirements-lock.txt; fi
          pip install pytest pytest-cov hypothesis cosmic-ray onnx onnxruntime fastapi uvicorn

      - name: 1. Run pytest with coverage
        run: |
          mkdir -p results/junit
          python -m pytest -q --cov=src/helix_ids --cov-report=term-missing --cov-fail-under=15 --junitxml=results/junit/nightly-report.xml

      - name: 2. Coverage report
        run: |
          python -m coverage report --format=markdown
          python -m coverage xml -o results/coverage.xml
          echo "COVERAGE=$(python -m coverage report --format=total | tail -1)" >> $GITHUB_ENV

      - name: 3. Skip-count validation
        if: always()
        run: |
          python3 scripts/ci/enforce_skip_governance.py

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: results/coverage.xml

      - name: Upload junit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-junit-report-${{ matrix.python-version }}
          path: results/junit/nightly-report.xml

  mutation:
    name: Mutation testing (${{ matrix.module }})
    if: ${{ github.ref_name == 'main' || github.event_name == 'workflow_dispatch' }}
    strategy:
      matrix:
        module:
          - metrics
          - loss
          - coral_loss
          - lifecycle_verifier
          - provenance
          - export
          - ast_validator
          - diagnostic_contract
          - schema_contract
      fail-fast: false
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-lock.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-lock.txt ]; then pip install -r requirements-lock.txt; fi
          pip install cosmic-ray

      - name: Mutation test — ${{ matrix.module }}
        continue-on-error: true
        timeout-minutes: 30
        run: |
          mkdir -p results/mutation
          TOML="config/mutation/cosmic-ray-pilot-${{ matrix.module }}.toml"
          # Handle filename variations: some use 'metrics' prefix, others use full module name
          if [ ! -f "$TOML" ]; then
            TOML="config/mutation/cosmic-ray-${{ matrix.module }}.toml"
          fi
          if [ -f "$TOML" ]; then
            cosmic-ray init "$TOML" /tmp/cr-${{ matrix.module }}.sqlite
            cosmic-ray exec "$TOML" /tmp/cr-${{ matrix.module }}.sqlite 2>&1 | tee results/mutation/cr-${{ matrix.module }}.log
            python3 scripts/ci/analyze_mutation_results.py /tmp/cr-${{ matrix.module }}.sqlite | tee results/mutation/cr-${{ matrix.module }}-summary.txt
          else
            echo "No config found for ${{ matrix.module }} — skipping"
          fi

      - name: Assertion audit validation
        if: always()
        run: |
          if [ -f docs/testing/ASSERTION_AUDIT.md ]; then
            echo "ASSERTION_AUDIT: PRESENT"
            echo "Audit sections:"
            grep '^## ' docs/testing/ASSERTION_AUDIT.md
          else
            echo "ASSERTION_AUDIT: MISSING"
            exit 1
          fi

      - name: Compile reliability summary score
        if: always()
        run: |
          python3 scripts/ci/compute_reliability_score.py | tee results/reliability-score.txt

      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-results-${{ matrix.module }}
          path: |
            results/mutation/**
            results/reliability-score.txt
