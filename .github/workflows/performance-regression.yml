name: Performance Regression Gates

on:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: src

jobs:
  performance-regression:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-lock.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-lock.txt ]; then pip install -r requirements-lock.txt; fi
          pip install numpy pandas torch

      - name: Run benchmark baseline
        run: |
          python scripts/benchmarks/benchmark_pipeline.py

      - name: Check performance regression
        run: |
          python scripts/benchmarks/check_performance_regression.py
