name: Architecture Lockdown

on:
  push:
    branches: [dev, main]
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/architecture/**"
      - ".github/workflows/architecture.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/architecture/**"

env:
  PYTHONPATH: src

jobs:
  architecture_check:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-lock.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-lock.txt ]; then pip install -r requirements-lock.txt; fi
          pip install pytest pytest-cov hypothesis

      - name: 1. Check frozen trainer size limits
        run: |
          echo "=== HelixFullTrainer LOC gate (≤ 2000) ==="
          python3 .github/scripts/trainer_size_check.py

      - name: 2. Verify zero reverse dependencies
        run: |
          echo "=== src -> scripts imports ==="
          python3 .github/scripts/reverse_deps_check.py

      - name: 3. Verify zero cycles
        run: |
          echo "=== Package cycle detection ==="
          python3 .github/scripts/cycle_check.py

      - name: 4. Run architecture pytest suite
        run: |
          python -m pytest tests/architecture/ -v --tb=short
