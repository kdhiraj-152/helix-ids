name: CI

on:
  push:
    branches: [dev]
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
      - "pyproject.toml"
      - "requirements*"
  pull_request:
    branches: [main, dev]
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
      - "pyproject.toml"
      - "requirements*"

env:
  PYTHONPATH: src

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-lock.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-lock.txt ]; then pip install -r requirements-lock.txt; fi
          pip install pytest pytest-cov ruff mypy hypothesis

      - name: 1. ruff check
        run: |
          ruff check src --output-format=github

      - name: 2. mypy (src)
        run: |
          mypy src --ignore-missing-imports

      - name: 3. pytest (fast subset)
        run: |
          python -m pytest -q \
            --ignore=tests/architecture \
            --ignore=tests/training \
            --ignore=tests/operations \
            --ignore=tests/test_data
