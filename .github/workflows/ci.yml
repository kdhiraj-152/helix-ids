name: CI

on:
  push:
    branches: [dev, main]
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
      - "pyproject.toml"
      - "requirements*"
  pull_request:
    branches: [main, dev]
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
      - "pyproject.toml"
      - "requirements*"

env:
  PYTHONPATH: src

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-lock.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-lock.txt ]; then pip install -r requirements-lock.txt; fi
          pip install pytest pytest-cov ruff mypy hypothesis

      - name: 1. Verify lockfile synchronized
        run: |  # only when requirements.in changed
          if [ -f requirements.in ] && git diff --name-only HEAD~1 2>/dev/null | grep -q requirements.in; then
            pip install uv 2>&1 | tail -1
            uv pip compile --python-platform=linux --generate-hashes --allow-unsafe --quiet \
              --output-file=/tmp/lockfile-verify.txt requirements.in 2>&1
            diff <(sed '1,5d' requirements-lock.txt) <(sed '1,5d' /tmp/lockfile-verify.txt) && \
              echo "LOCKFILE: synchronized" || \
              { echo "::error title=Lockfile stale::requirements-lock.txt out of sync"; exit 1; }
          else
            echo "LOCKFILE: no change to requirements.in — skipping verify"
          fi

      - name: 2. ruff check
        run: |
          ruff check src --output-format=github
          ruff check \
            tests/test_data/test_augmentation.py \
            tests/test_data/test_feature_io.py \
            tests/test_data/test_feature_engineering.py \
            tests/test_operations/test_log_context.py \
            tests/test_operations/test_log_formatter.py \
            tests/test_operations/test_monitoring.py \
            tests/test_operations/test_structured_logger.py \
            tests/test_utils/test_export_pipeline.py \
            --output-format=github

      - name: 3. mypy (src)
        run: |
          mypy src --ignore-missing-imports

      - name: 4. pytest (fast subset)
        run: |
          python -m pytest -q \
            tests/test_utils/test_export_pipeline.py \
            tests/test_data/test_augmentation.py \
            tests/test_data/test_feature_io.py \
            tests/test_data/test_feature_engineering.py \
            tests/test_data/test_schema_contract.py \
            tests/test_data/test_unified_loader.py \
            tests/test_models/test_loss.py \
            tests/test_utils/test_metrics.py \
            --ignore=tests/architecture \
            --ignore=tests/training \
            --ignore=tests/operations \
            --ignore=tests/test_data/test_feature_harmonization.py \
            --ignore=tests/test_data/test_data_loading.py \
            --ignore=tests/test_data/test_unsw_learnability_contract.py \
            --ignore=tests/test_data/test_phase1_harmonization.py \
            --ignore=tests/test_models/test_helix_full.py \
            --ignore=tests/test_e2e_smoke.py
