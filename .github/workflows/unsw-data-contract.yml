name: UNSW Data Contract

"on":
  pull_request: {}
  push:
    branches:
      - main

jobs:
  unsw-contract-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate UNSW learnability artifact
        run: |
          python scripts/validation/validate_unsw_learnability.py --artifact-dir data/processed/multi_dataset_v1

      - name: Enforce contract test
        run: |
          python -m pytest tests/test_data/test_unsw_learnability_contract.py -q
