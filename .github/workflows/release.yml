name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  actions: read
  id-token: write   # needed for Sigstore keyless signing + SLSA provenance

jobs:
  verify:
    name: Release verification
    runs-on: ubuntu-24.04
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-lock.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-lock.txt ]; then pip install -r requirements-lock.txt; fi
          pip install pip-audit bandit cyclonedx-bom pytest pytest-cov hypothesis
          pip install ruff mypy pip-licenses pip-tools

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: 1. Verify lockfile synchronized
        run: |
          pip-compile --quiet --output-file=/tmp/lockfile-verify.txt requirements.in 2>&1
          if diff -q requirements-lock.txt /tmp/lockfile-verify.txt 2>/dev/null; then
            echo "LOCKFILE: synchronized"
          else
            echo "::error title=Lockfile stale::requirements-lock.txt does not match requirements.in"
            exit 1
          fi
          echo "Lockfile entries: $(grep -c '==' requirements-lock.txt 2>/dev/null || echo 0)"

      - name: 2. Generate SBOM + validate
        run: |
          mkdir -p results/sbom
          cyclonedx-py requirements \
            requirements-lock.txt \
            --output-reproducible \
            --output-file results/sbom/sbom.json \
            --output-format JSON \
            --no-validate 2>&1
          echo "SBOM generated: $(wc -c < results/sbom/sbom.json) bytes"
          cyclonedx-py requirements \
            requirements-lock.txt \
            --output-reproducible \
            --output-file /dev/null \
            --output-format JSON \
            --validate 2>&1
          echo "SBOM: valid"

      - name: 3. SBOM Attestation
        run: |
          mkdir -p results/attestations
          echo '{"_type":"https://in-toto.io/Statement/v1","subject":[{"name":"results/sbom/sbom.json","digest":{"sha256":"'$(sha256sum results/sbom/sbom.json | cut -d' ' -f1)'"}}],"predicateType":"https://spdx.dev/Document","predicate":{"created":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","packages":'$(python3 -c "import json; d=json.load(open('results/sbom/sbom.json')); print(len(d.get('components',d.get('packages',[]))))")'}}' > results/attestations/sbom-attestation.json
          echo "SBOM attestation created"
          sha256sum -c <<< "$(sha256sum results/attestations/sbom-attestation.json)"
          echo "SBOM ATTESTATION: valid"

      - name: 4. Verify coverage threshold (≥65%)
        run: |
          mkdir -p results/junit
          python -m pytest -q --cov-fail-under=65 --junitxml=results/junit/release-report.xml 2>&1 | tail -10

      - name: 5. Verify Ruff
        run: |
          ruff check src
          echo "RUFF: 0 violations"

      - name: 6. Verify Mypy
        run: |
          mypy src
          echo "MYPY: 0 errors"

      - name: 7. Verify pip-audit
        run: |
          pip-audit --strict --desc on
          echo "PIP-AUDIT: 0 unknown vulnerabilities"

      - name: 8. Verify Bandit (HIGH only)
        run: |
          RESULTS=$(bandit -r src -ll -f json --quiet 2>&1 || true)
          HIGH_COUNT=$(echo "$RESULTS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(sum(1 for r in d.get('results',[]) if r.get('issue_severity')=='HIGH'))" 2>/dev/null || echo "0")
          if [ "$HIGH_COUNT" != "0" ]; then
            echo "::error title=Bandit HIGH findings::$HIGH_COUNT HIGH-severity issues found"
            echo "$RESULTS" | python3 -c "import sys,json; d=json.load(sys.stdin); [print(f'  {r[\"filename\"]}:{r[\"line_number\"]} — {r[\"issue_text\"]}') for r in d.get('results',[]) if r.get('issue_severity')=='HIGH']" 2>/dev/null
            exit 1
          fi
          echo "BANDIT: 0 HIGH findings"

      - name: 9. Generate artifact checksums
        run: |
          sha256sum requirements-lock.txt > results/checksums.sha256
          if [ -f results/sbom/sbom.json ]; then sha256sum results/sbom/sbom.json >> results/checksums.sha256; fi
          if [ -f results/attestations/sbom-attestation.json ]; then sha256sum results/attestations/sbom-attestation.json >> results/checksums.sha256; fi
          if [ -f results/licenses/licenses.json ]; then sha256sum results/licenses/licenses.json >> results/checksums.sha256; fi
          if [ -f results/provenance/slsa-attestation.json ]; then sha256sum results/provenance/slsa-attestation.json >> results/checksums.sha256; fi
          echo "Checksums:"
          cat results/checksums.sha256

      - name: 10. Verify checksums
        run: |
          if [ -f results/checksums.sha256 ]; then
            sha256sum -c results/checksums.sha256
            echo "CHECKSUMS: all verified"
          else
            echo "::error title=Checksums missing::results/checksums.sha256 not found"
            exit 1
          fi

      - name: 11. Generate SLSA provenance
        run: |
          python3 scripts/ci/generate_slsa_provenance.py release results/provenance
          echo "SLSA PROVENANCE: generated"

      - name: 12. Verify SLSA provenance
        run: |
          python3 scripts/ci/verify_slsa_provenance.py results/provenance/slsa-attestation.json
          echo "SLSA PROVENANCE: verified"

      - name: 13. Verify license compliance
        run: |
          mkdir -p results/licenses
          pip-licenses --format=csv --output-file=results/licenses/licenses.csv
          pip-licenses --format=json --output-file=results/licenses/licenses.json
          python3 scripts/ci/check_licenses_v2.py results/licenses/licenses.csv

      - name: 14. Generate consolidated trust report
        run: |
          mkdir -p results/trust-report
          python3 scripts/ci/generate_trust_report.py results/trust-report

      - name: 15. Upload verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-verification
          path: |
            results/sbom/sbom.json
            results/checksums.sha256
            results/junit/release-report.xml
            results/licenses/licenses.csv
            results/licenses/licenses.json
            results/provenance/slsa-attestation.json
            results/attestations/sbom-attestation.json
            results/trust-report/trust-report.json

  sign:
    name: Release signing
    needs: [verify]
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: write
      packages: write
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-lock.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-lock.txt ]; then pip install -r requirements-lock.txt; fi
          pip install cyclonedx-bom pip-licenses

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Download verification artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-verification
          path: results/

      - name: Generate SBOM
        run: |
          mkdir -p results/sbom
          cyclonedx-py requirements \
            requirements-lock.txt \
            --output-reproducible \
            --output-file results/sbom/sbom.json \
            --output-format JSON \
            --no-validate 2>&1
          echo "SBOM generated: $(wc -c < results/sbom/sbom.json) bytes"

      - name: Generate license inventory
        run: |
          mkdir -p results/licenses
          pip-licenses --format=json --output-file=results/licenses/licenses.json
          pip-licenses --format=csv --output-file=results/licenses/licenses.csv
          echo "License inventory generated"

      - name: Generate SLSA provenance
        run: |
          python3 scripts/ci/generate_slsa_provenance.py release results/provenance
          echo "SLSA provenance generated"

      - name: Generate checksums
        run: |
          sha256sum requirements-lock.txt > results/checksums.sha256
          if [ -f results/sbom/sbom.json ]; then sha256sum results/sbom/sbom.json >> results/checksums.sha256; fi
          if [ -f results/licenses/licenses.json ]; then sha256sum results/licenses/licenses.json >> results/checksums.sha256; fi
          if [ -f results/provenance/slsa-attestation.json ]; then sha256sum results/provenance/slsa-attestation.json >> results/checksums.sha256; fi
          echo "Checksums:"
          cat results/checksums.sha256

      - name: Sign artifacts (keyless)
        run: |
          mkdir -p results/signatures
          for ARTIFACT in requirements-lock.txt results/sbom/sbom.json results/checksums.sha256 results/provenance/slsa-attestation.json results/licenses/licenses.json; do
            if [ -f "$ARTIFACT" ]; then
              cosign sign-blob \
                --yes \
                --bundle "results/signatures/$(basename $ARTIFACT).bundle" \
                --output-signature "results/signatures/$(basename $ARTIFACT).sig" \
                "$ARTIFACT" 2>&1
              echo "SIGNED: $ARTIFACT"
            fi
          done

      - name: Verify signatures
        run: |
          for ARTIFACT in requirements-lock.txt results/sbom/sbom.json results/checksums.sha256 results/provenance/slsa-attestation.json results/licenses/licenses.json; do
            BASE=$(basename $ARTIFACT)
            if [ -f "results/signatures/$BASE.sig" ]; then
              cosign verify-blob \
                --bundle "results/signatures/$BASE.bundle" \
                --signature "results/signatures/$BASE.sig" \
                "$ARTIFACT" 2>&1
              echo "VERIFIED: $ARTIFACT"
            fi
          done
          echo "All signatures verified successfully."

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container
        run: |
          docker build --target production -t ghcr.io/${{ github.repository }}:${{ github.ref_name }} .
          echo "Container built: ghcr.io/${{ github.repository }}:${{ github.ref_name }}"

      - name: Push container to GHCR
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          echo "Container pushed: ghcr.io/${{ github.repository }}:${{ github.ref_name }}"

      - name: Sign container (Cosign keyless)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }} 2>&1
          echo "CONTAINER SIGNED: ghcr.io/${{ github.repository }}:${{ github.ref_name }}"

      - name: Verify container signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/release.yml" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }} 2>&1
          echo "CONTAINER VERIFIED: ghcr.io/${{ github.repository }}:${{ github.ref_name }}"

      - name: Upload signing artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-signatures
          path: |
            results/signatures/*.sig
            results/signatures/*.bundle
            results/checksums.sha256
            results/sbom/sbom.json
            results/licenses/licenses.json
            results/licenses/licenses.csv
            results/provenance/slsa-attestation.json
